<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- flex -->
    <!-- 
        1. 세로 콘텐츠
        ㄴ 정렬(text-align, margin:0 auto)
        ㄴ 폰트(font-size, color, line height)
        ㄴ 여백(margin, padding)

        2. 가로 콘텐츠(레이아웃, 정렬)
        ㄴ flex
        ㄴ float
    -->
    <h2>justify-content</h2>
    <div class="flex between">
        <div>01</div>
        <div>02</div>
        <div>03</div>
    </div>

    <div class="flex around">
        <div>01</div>
        <div>02</div>
        <div>03</div>
    </div>

    <div class="flex evenly">
        <div>01</div>
        <div>02</div>
        <div>03</div>
    </div>
<!-- - - - - - -->
    <div class="flex start">
        <div>01</div>
        <div>02</div>
        <div>03</div>
    </div>

    <div class="flex center">
        <div>01</div>
        <div>02</div>
        <div>03</div>
    </div>

    <div class="flex end">
        <div>01</div>
        <div>02</div>
        <div>03</div>
    </div>
   
    <h2>flex-wrap/align-items</h2>
    <div class="flex wrap between hei h-between">
        <div>01</div>
        <div>02</div>
        <div>03</div>
        <div>04</div>
        <div>05</div>
        <div>06</div>
    </div>

    <div class="flex hei center h-center">
        <div>01</div>
        
    </div>

    <!-- ----- -->
    <div class="self">
            <div>
                <div class="photo"></div>
                <div>Exevarri</div>
            </div>
    </div>

    <style>
        h2{ }
        /* 부모 */
        .flex{ 
            width: 800px; margin: 100px auto;
            border: 1px solid black;
            display: flex;
            color:white;
        }
        /* 자식 */
        .flex > div{
            width: 30%; height:200px;
            background-color: blue;
        }
        h2{text-align: center;}
        .between{justify-content: space-between;}
        .around{justify-content: space-around;}
        .evenly{justify-content: space-evenly ;}
        
        .start{justify-content: start;}
        .center{justify-content: center;}
        .end{justify-content: end;}

        .wrap{flex-wrap: wrap;}
        .hei{height: 600px;}
        .h-between{align-content: space-between;}
        .h-center{align-items: center;}

        /* ----- */
        .self{
            width: 1000px;
            border: 1px solid black;
            display: flex;
        }
        .self .photo{
            background-color: gray;
            width: 100;
            height: 100;
        }
        /* 
        display: flex;
        justify-content: start | center | end | space-between |  
                         space-around | space-evenly;

        align-content: start | center | end |space-between |
                       space-around | space-evenly;

        align-items: start | center| end;

        flex-wrap: wrap | nowrap;

        * justify-content, align-content => 아이템이 여러개 있을때
    
        */
    </style>
</body>
</html>
